name: Update ECM Catalog

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed to commit back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run catalog update script
        run: python update_catalog.py

      - name: Commit and push if there are changes
        run: |
          git config user.name  "ECM Catalog Bot"
          git config user.email "bot@users.noreply.github.com"
          git add index.html
          # Only commit if index.html actually changed
          if git diff --staged --quiet; then
            echo "No new releases found. Nothing to commit."
          else
            ADDED=$(git diff --staged --stat | tail -1)
            git commit -m "chore: update ECM catalog — $ADDED"
            git push
            echo "Catalog updated and pushed to GitHub Pages."
          fi
