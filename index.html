<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ECM Records Catalog</title>
<style>
:root {
  --bg:#0a0a0a; --bg2:#111; --bg3:#181818; --bg4:#1e1e1e;
  --border:#2a2a2a; --border2:#333;
  --text:#e8e8e8; --text2:#aaa; --text3:#666;
  --accent:#4a9eff; --accent2:#2d7adb;
  --gold:#c9a84c; --gold2:#a8893e;
  --red:#c0392b;
  --radius:4px;
  --sidebar:260px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;
     font-size:13px;display:flex;height:100vh;overflow:hidden}

/* ── SIDEBAR ── */
#sidebar{width:var(--sidebar);min-width:var(--sidebar);background:var(--bg2);
  border-right:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden}
#sidebar-header{padding:20px 16px 12px;border-bottom:1px solid var(--border)}
#sidebar-header h1{font-size:15px;font-weight:600;letter-spacing:.12em;text-transform:uppercase;color:var(--text)}
#sidebar-header p{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:.06em;text-transform:uppercase}
#nav{flex:1;overflow-y:auto;padding:8px 0}
#nav::-webkit-scrollbar{width:4px}
#nav::-webkit-scrollbar-thumb{background:var(--border2)}
.nav-section{padding:10px 16px 4px;font-size:10px;color:var(--text3);
  letter-spacing:.1em;text-transform:uppercase;font-weight:600}
.nav-btn{display:block;width:100%;text-align:left;background:none;border:none;
  color:var(--text2);padding:6px 16px;cursor:pointer;font-size:12px;
  border-left:2px solid transparent;transition:all .15s}
.nav-btn:hover{background:var(--bg3);color:var(--text)}
.nav-btn.active{color:var(--accent);border-left-color:var(--accent);background:var(--bg3)}
.nav-count{float:right;font-size:10px;color:var(--text3);margin-top:1px}

/* cover cache panel */
#cover-cache-panel{padding:12px 14px;border-top:1px solid var(--border);background:var(--bg2)}
#cover-cache-panel .panel-label{font-size:10px;color:var(--text3);letter-spacing:.08em;
  text-transform:uppercase;margin-bottom:6px}
#cache-stats{font-size:11px;color:var(--text2);margin-bottom:8px;line-height:1.5}
.cache-btn{display:block;width:100%;text-align:left;background:var(--bg4);border:1px solid var(--border2);
  color:var(--text2);padding:5px 10px;border-radius:var(--radius);cursor:pointer;
  font-size:11px;margin-bottom:5px;transition:all .15s}
.cache-btn:hover{background:var(--bg3);color:var(--text);border-color:var(--border2)}
#cache-progress{margin-top:6px;font-size:10px;color:var(--text3);min-height:14px}
#cache-progress-bar{height:2px;background:var(--border);border-radius:1px;margin-top:4px;display:none}
#cache-progress-fill{height:100%;background:var(--accent);border-radius:1px;width:0%;transition:width .3s}

/* ── MAIN ── */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden}
#topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;
  background:var(--bg2);border-bottom:1px solid var(--border)}
#search{flex:1;background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:7px 12px;border-radius:var(--radius);font-size:13px;outline:none}
#search:focus{border-color:var(--accent)}
#search::placeholder{color:var(--text3)}
#filter-bar{display:flex;gap:6px;padding:8px 16px;background:var(--bg2);
  border-bottom:1px solid var(--border);flex-wrap:wrap;align-items:center}
.filter-btn{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:4px 10px;border-radius:var(--radius);cursor:pointer;font-size:11px;transition:all .15s}
.filter-btn:hover{border-color:var(--border2);color:var(--text)}
.filter-btn.active{background:var(--accent);border-color:var(--accent);color:#fff}
.filter-btn.gold.active{background:var(--gold);border-color:var(--gold);color:#111}
#sort-select{background:var(--bg3);border:1px solid var(--border2);color:var(--text2);
  padding:4px 8px;border-radius:var(--radius);font-size:11px;cursor:pointer;outline:none;margin-left:auto}
#results-info{font-size:11px;color:var(--text3);padding:0 16px;white-space:nowrap}

/* ── GRID ── */
#content{flex:1;overflow-y:auto;padding:16px}
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
#album-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px}
.album-card{background:var(--bg2);border:1px solid var(--border);border-radius:6px;
  cursor:pointer;transition:all .2s;overflow:hidden;position:relative}
.album-card:hover{border-color:var(--border2);transform:translateY(-2px);
  box-shadow:0 6px 20px rgba(0,0,0,.5)}
.album-cover{width:100%;aspect-ratio:1;position:relative;overflow:hidden}
.album-cover img{width:100%;height:100%;object-fit:cover;display:block;position:absolute;inset:0;opacity:0;transition:opacity .4s}
.album-cover img.loaded{opacity:1}
.album-cover-bg{position:absolute;inset:0;display:flex;align-items:center;
  justify-content:center}
.album-cover-num{font-size:9px;color:rgba(255,255,255,.25);letter-spacing:.05em;
  font-weight:600;text-transform:uppercase}
.album-info{padding:8px 10px}
.album-artist{font-size:10px;color:var(--text3);margin-bottom:2px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-title{font-size:11px;color:var(--text);font-weight:500;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.album-meta{display:flex;align-items:center;gap:4px;margin-top:4px}
.album-year{font-size:10px;color:var(--text3)}
.album-cat{font-size:9px;color:var(--text3);margin-left:auto;opacity:.6}

/* indicators */
.ind{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.ind-owned{background:var(--accent)}
.ind-wish{background:var(--gold)}

/* ── DETAIL PANEL ── */
#detail-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;
  display:none;align-items:center;justify-content:center;padding:20px}
#detail-overlay.open{display:flex}
#detail-panel{background:var(--bg2);border:1px solid var(--border2);border-radius:8px;
  width:100%;max-width:680px;max-height:90vh;overflow-y:auto;display:flex;flex-direction:column}
#detail-panel::-webkit-scrollbar{width:5px}
#detail-panel::-webkit-scrollbar-thumb{background:var(--border2)}
#detail-top{display:flex;gap:20px;padding:20px}
#detail-cover{width:160px;min-width:160px;aspect-ratio:1;border-radius:4px;overflow:hidden;position:relative}
#detail-cover img{width:100%;height:100%;object-fit:cover;position:absolute;inset:0}
#detail-cover-bg{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
#detail-cover-num{font-size:11px;color:rgba(255,255,255,.2);letter-spacing:.06em;font-weight:600}
#detail-meta{flex:1}
#detail-cat{font-size:11px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
#detail-title{font-size:20px;font-weight:600;color:var(--text);line-height:1.2;margin-bottom:8px}
#detail-artist{font-size:14px;color:var(--text2);margin-bottom:6px}
#detail-year{font-size:12px;color:var(--text3);margin-bottom:12px}
#detail-musicians{font-size:12px;color:var(--text2);line-height:1.6;margin-bottom:12px}
#detail-notes{font-size:11px;color:var(--text3);font-style:italic;margin-bottom:12px}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:7px 14px;border-radius:var(--radius);border:1px solid;cursor:pointer;
  font-size:12px;font-weight:500;transition:all .15s}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent2);border-color:var(--accent2)}
.btn-owned-active{background:var(--bg3);border-color:var(--accent);color:var(--accent)}
.btn-owned-active:hover{background:var(--accent);color:#fff}
.btn-wish{background:var(--bg3);border-color:var(--border2);color:var(--text2)}
.btn-wish:hover{border-color:var(--gold);color:var(--gold)}
.btn-wish-active{background:var(--bg3);border-color:var(--gold);color:var(--gold)}
.btn-wish-active:hover{background:var(--gold);color:#111}
.btn-close{background:var(--bg3);border-color:var(--border2);color:var(--text2);margin-left:auto}
.btn-close:hover{border-color:var(--border2);color:var(--text)}
#detail-purchase{margin-top:10px;display:none}
#detail-purchase label{font-size:11px;color:var(--text3);display:block;margin-bottom:4px}
#detail-purchase input{background:var(--bg3);border:1px solid var(--border2);color:var(--text);
  padding:5px 10px;border-radius:var(--radius);font-size:12px;outline:none}
#detail-purchase input:focus{border-color:var(--accent)}
#detail-sections{padding:0 20px 20px;border-top:1px solid var(--border)}
.section-title{font-size:10px;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;
  font-weight:600;padding:14px 0 8px}
.musician-list{display:flex;flex-wrap:wrap;gap:6px}
.musician-tag{background:var(--bg3);border:1px solid var(--border);color:var(--text2);
  padding:3px 9px;border-radius:12px;font-size:11px;cursor:pointer;transition:all .15s}
.musician-tag:hover{border-color:var(--accent);color:var(--accent)}
.related-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px}
.related-card{background:var(--bg3);border:1px solid var(--border);border-radius:4px;
  padding:8px;cursor:pointer;transition:all .15s}
.related-card:hover{border-color:var(--border2);background:var(--bg4)}
.related-cover{width:100%;aspect-ratio:1;border-radius:2px;overflow:hidden;position:relative;margin-bottom:6px}
.related-cover img{width:100%;height:100%;object-fit:cover;opacity:0;transition:opacity .3s;position:absolute;inset:0}
.related-cover img.loaded{opacity:1}
.related-shared{font-size:9px;color:var(--text3);margin-bottom:3px}
.related-artist{font-size:10px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.related-title{font-size:11px;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500}

/* ── ARTIST VIEW ── */
#artist-header{display:none;padding:12px 16px;background:var(--bg2);
  border-bottom:1px solid var(--border);align-items:center;gap:10px}
#artist-header.open{display:flex}
#artist-name-display{font-size:15px;font-weight:600;flex:1}
#artist-back{background:none;border:none;color:var(--text3);cursor:pointer;
  font-size:20px;line-height:1;padding:2px 6px;border-radius:3px}
#artist-back:hover{color:var(--text);background:var(--bg3)}

/* empty state */
#empty{display:none;padding:60px 20px;text-align:center;color:var(--text3)}
#empty.show{display:block}
#empty h2{font-size:16px;margin-bottom:8px;color:var(--text2)}

/* loading spinner */
.spinner{width:16px;height:16px;border:2px solid var(--border2);
  border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

/* scrollbar for content */
#content::-webkit-scrollbar{width:6px}
#content::-webkit-scrollbar-track{background:var(--bg)}
#content::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
</style>
</head>

<!-- SIDEBAR -->
<nav id="sidebar">
  <div id="sidebar-header">
    <h1>ECM Records</h1>
    <p>Catalogo personale</p>
  </div>
  <div id="nav">
    <div class="nav-section">Catalogo</div>
    <button class="nav-btn active" onclick="showAll()" id="nav-all">
      Tutto <span class="nav-count" id="cnt-all">0</span>
    </button>
    <button class="nav-btn" onclick="showOwned()" id="nav-owned">
      Miei dischi <span class="nav-count" id="cnt-owned">0</span>
    </button>
    <button class="nav-btn" onclick="showWishlist()" id="nav-wish">
      Wishlist <span class="nav-count" id="cnt-wish">0</span>
    </button>
    <div class="nav-section" style="margin-top:8px">Serie</div>
    <button class="nav-btn" onclick="filterSeries('1000')" id="nav-1000">
      ECM 1000 <span class="nav-count" id="cnt-1000">0</span>
    </button>
    <button class="nav-btn" onclick="filterSeries('2000')" id="nav-2000">
      ECM 2000 <span class="nav-count" id="cnt-2000">0</span>
    </button>
    <button class="nav-btn" onclick="filterSeries('rarum')" id="nav-rarum">
      ECM Rarum <span class="nav-count" id="cnt-rarum">0</span>
    </button>
    <button class="nav-btn" onclick="filterSeries('works')" id="nav-works">
      ECM Works <span class="nav-count" id="cnt-works">0</span>
    </button>
  </div>

  <div id="cover-cache-panel">
    <div class="panel-label">Cover Cache</div>
    <div id="cache-stats">Caricamento…</div>
    <button class="cache-btn" id="btn-cache-all" onclick="cacheAllCovers()">↓ Scarica tutte le copertine</button>
    <button class="cache-btn" onclick="clearCacheAndRefresh()">✕ Cancella cache</button>
    <div id="cache-progress"></div>
    <div id="cache-progress-bar"><div id="cache-progress-fill"></div></div>
  </div>
</nav>

<!-- MAIN -->
<div id="main">
  <div id="topbar">
    <input id="search" type="search" placeholder="Cerca artista, titolo, catalogo…" oninput="onSearch(this.value)">
    <span id="results-info"></span>
  </div>
  <div id="filter-bar">
    <button class="filter-btn" id="fb-decade" onclick="toggleDecade()">Decade ▾</button>
    <div id="decade-pills" style="display:none;gap:5px;flex-wrap:wrap"></div>
    <select id="sort-select" onchange="onSort(this.value)">
      <option value="cat">Catalogo</option>
      <option value="year">Anno</option>
      <option value="artist">Artista</option>
      <option value="title">Titolo</option>
    </select>
  </div>
  <div id="artist-header">
    <button id="artist-back" onclick="clearArtist()">←</button>
    <span id="artist-name-display"></span>
  </div>
  <div id="content">
    <div id="album-grid"></div>
    <div id="empty"><h2>Nessun risultato</h2><p>Prova con altri termini di ricerca</p></div>
  </div>
</div>

<!-- DETAIL OVERLAY -->
<div id="detail-overlay" onclick="closeDetail(event)">
  <div id="detail-panel">
    <div id="detail-top">
      <div id="detail-cover">
        <div id="detail-cover-bg"><span id="detail-cover-num"></span></div>
        <img id="detail-cover-img" alt="" onload="this.classList.add('loaded');coverLoaded(this)">
      </div>
      <div id="detail-meta">
        <div id="detail-cat"></div>
        <div id="detail-title"></div>
        <div id="detail-artist"></div>
        <div id="detail-year"></div>
        <div id="detail-musicians"></div>
        <div id="detail-notes"></div>
        <div class="detail-actions">
          <button class="btn" id="btn-owned" onclick="toggleOwned()"></button>
          <button class="btn btn-wish" id="btn-wish" onclick="toggleWish()">♡ Wishlist</button>
          <button class="btn btn-close" onclick="closeDetailDirect()">✕</button>
        </div>
        <div id="detail-purchase">
          <label>Data di acquisto</label>
          <input type="date" id="purchase-date-input" onchange="savePurchaseDate(this.value)">
        </div>
      </div>
    </div>
    <div id="detail-sections">
      <div id="related-section" style="display:none">
        <div class="section-title">Album collegati <span id="related-count" style="color:var(--text3);font-weight:400"></span></div>
        <div class="related-list" id="related-list"></div>
      </div>
      <div id="musicians-section" style="display:none">
        <div class="section-title">Musicisti</div>
        <div class="musician-list" id="musician-list"></div>
      </div>
    </div>
  </div>
</div>

// ═══════════════════════════════════════════════════════════
//  INDEXEDDB  (image blob cache)
// ═══════════════════════════════════════════════════════════
let idb = null;
const blobUrlCache = new Map();  // albumId → objectURL (in-session)
const coverCache   = new Map();  // albumId → img element src already applied (mbid stage)

async function openIDB() {
  return new Promise((resolve) => {
    const req = indexedDB.open('ecm_cover_images', 1);
    req.onupgradeneeded = e => { e.target.result.createObjectStore('covers'); };
    req.onsuccess = e => { idb = e.target.result; resolve(idb); };
    req.onerror   = () => { idb = null; resolve(null); };
  });
}

async function idbGet(id) {
  if (!idb) return null;
  return new Promise(resolve => {
    const tx = idb.transaction('covers','readonly');
    const req = tx.objectStore('covers').get(id);
    req.onsuccess = () => resolve(req.result || null);
    req.onerror   = () => resolve(null);
  });
}

async function idbPut(id, blob) {
  if (!idb) return;
  return new Promise(resolve => {
    const tx = idb.transaction('covers','readwrite');
    tx.objectStore('covers').put(blob, id);
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

async function idbClear() {
  if (!idb) return;
  return new Promise(resolve => {
    const tx = idb.transaction('covers','readwrite');
    tx.objectStore('covers').clear();
    tx.oncomplete = resolve;
    tx.onerror    = resolve;
  });
}

async function idbCount() {
  if (!idb) return {count:0, bytes:0};
  return new Promise(resolve => {
    const tx = idb.transaction('covers','readonly');
    const store = tx.objectStore('covers');
    const countReq = store.count();
    let count = 0;
    countReq.onsuccess = () => { count = countReq.result; };
    // Estimate size via getAllKeys + getAll
    const allReq = store.getAll();
    allReq.onsuccess = () => {
      let bytes = 0;
      (allReq.result||[]).forEach(b => { if(b && b.size) bytes += b.size; });
      resolve({count, bytes});
    };
    allReq.onerror = () => resolve({count, bytes:0});
  });
}

async function getBlobUrl(albumId) {
  if (blobUrlCache.has(albumId)) return blobUrlCache.get(albumId);
  const blob = await idbGet(albumId);
  if (!blob) return null;
  const url = URL.createObjectURL(blob);
  blobUrlCache.set(albumId, url);
  return url;
}

function loadStorage() {
  try { collection = JSON.parse(localStorage.getItem('ecm_collection_v2') || '{}'); } catch(e){ collection={}; }
  try { wishlist   = JSON.parse(localStorage.getItem('ecm_wishlist_v1')    || '{}'); } catch(e){ wishlist={}; }
  try { mbidCache  = JSON.parse(localStorage.getItem('ecm_mbid_v1')        || '{}'); } catch(e){ mbidCache={}; }
}

function saveWishlist()   { localStorage.setItem('ecm_wishlist_v1',    JSON.stringify(wishlist)); }

const ALIASES = {
  'David Holland': 'Dave Holland',
  'Miroslav Vitous': 'Miroslav Vitouš',
  'Tomasz Stanko': 'Tomasz Stańko',
};
function normName(n) { return ALIASES[n] || n; }

function buildArtistIndex() {

    const names = new Set([...a.artistList, ...a.musicianList].map(normName));

// ═══════════════════════════════════════════════════════════
//  COVER  (MusicBrainz → CAA → IndexedDB blob)
// ═══════════════════════════════════════════════════════════
let coverQueue = [];
let coverBusy  = false;
const COVER_INTERVAL = 1100;  // ms between MB requests

function enqueueCover(albumId, imgEl) {
  coverQueue.push({albumId, imgEl});
  processQueue();
}

async function processQueue() {
  if (coverBusy || coverQueue.length === 0) return;
  coverBusy = true;
  const {albumId, imgEl} = coverQueue.shift();
  await loadCover(albumId, imgEl);
  setTimeout(() => { coverBusy = false; processQueue(); }, COVER_INTERVAL);
}

async function loadCover(albumId, imgEl) {
  // 1. Check in-session blob URL (already loaded this session)
  if (blobUrlCache.has(albumId)) {
    // Only set src if not already pointing to this URL — prevents double-load
    // restart caused by post-render loop + observer both calling applySrc
    const cachedUrl = blobUrlCache.get(albumId);
    if (imgEl.getAttribute('src') !== cachedUrl) applySrc(imgEl, cachedUrl);
    return;
  }

  // 2. Check IndexedDB (offline cache — populated by "Cache all")
  const blob = await idbGet(albumId);
  if (blob) {
    const url = URL.createObjectURL(blob);
    blobUrlCache.set(albumId, url);
    applySrc(imgEl, url);
    return;
  }

  // 3. Load from network: resolve mbid → set img.src directly.
  //    The browser handles HTTP redirects, caching, and CORS for <img> natively.
  let mbid = mbidCache[albumId];
  if (mbid === undefined) {
    mbid = await fetchMbid(albumId);
    mbidCache[albumId] = mbid;
    saveMbidCache();
  }
  if (!mbid) return;

  const coverUrl = `https://coverartarchive.org/release/${mbid}/front-250`;
  // Store network URL in blobUrlCache so re-renders can restore it immediately
  blobUrlCache.set(albumId, coverUrl);
  applySrc(imgEl, coverUrl);
}

// Called by img onload — ensures the src survives any future re-renders
function coverLoaded(img) {
  const id = img.dataset.albumId;
  if (id && img.src && !img.src.startsWith('data:') && img.src !== window.location.href) {
    blobUrlCache.set(id, img.src);
  }
}

async function fetchMbid(albumId) {
  // Extract ECM number (e.g. "ECM 1013 ST" → "1013")
  const m = albumId.match(/ECM\s+([\d]+)/i);
  if (!m) return null;
  const num = m[1];
  try {
    const url = `https://musicbrainz.org/ws/2/release?query=catno:%22ECM%20${num}%22&limit=3&fmt=json`;
    const r = await fetch(url, {headers:{'User-Agent':'ECMCatalogApp/1.0 (ale.michetti@gmail.com)'}});
    if (!r.ok) return null;
    const data = await r.json();
    if (!data.releases || !data.releases.length) return null;
    return data.releases[0].id;
  } catch(e) { return null; }
}

function applySrc(imgEl, src) {
  if (!imgEl || !imgEl.isConnected) return;
  imgEl.src = src;
}

// ═══════════════════════════════════════════════════════════
//  COVER CACHE STATS
// ═══════════════════════════════════════════════════════════
async function refreshCacheStats() {
  const {count, bytes} = await idbCount();
  const mb = (bytes / 1024 / 1024).toFixed(1);
  const total = ALBUMS.length;
  document.getElementById('cache-stats').innerHTML =
    `${count} / ${total} copertine<br><span style="color:var(--text3)">${mb} MB</span>`;
}

let cacheAllRunning = false;
let cacheAllAbort = false;

async function cacheAllCovers() {
  if (cacheAllRunning) { cacheAllAbort = true; return; }
  cacheAllRunning = true;
  cacheAllAbort   = false;
  const btn = document.getElementById('btn-cache-all');
  const prog = document.getElementById('cache-progress');
  const bar  = document.getElementById('cache-progress-bar');
  const fill = document.getElementById('cache-progress-fill');
  btn.textContent = '⬛ Ferma';
  bar.style.display = 'block';

  const uncached = ALBUMS.filter(a => !blobUrlCache.has(a.id));
  let done = 0;
  for (const a of uncached) {
    if (cacheAllAbort) break;
    // Check IDB first
    const inIDB = await getBlobUrl(a.id);
    if (!inIDB) {
      let mbid = mbidCache[a.id];
      if (mbid === undefined) {
        mbid = await fetchMbid(a.id);
        mbidCache[a.id] = mbid;
        saveMbidCache();
      }
      if (mbid) {
        try {
          const url = `https://coverartarchive.org/release/${mbid}/front-250`;
          const resp = await fetch(url);
          if (resp.ok) {
            const blob = await resp.blob();
            await idbPut(a.id, blob);
            const objUrl = URL.createObjectURL(blob);
            blobUrlCache.set(a.id, objUrl);
          }
        } catch(e) {}
      }
      await sleep(COVER_INTERVAL);
    }
    done++;
    const pct = Math.round(done / uncached.length * 100);
    fill.style.width = pct + '%';
    prog.textContent = `${done} / ${uncached.length}`;
    if (done % 20 === 0) await refreshCacheStats();
  }

  cacheAllRunning = false;
  btn.textContent = '↓ Scarica tutte le copertine';
  bar.style.display = 'none';
  prog.textContent = cacheAllAbort ? 'Interrotto.' : 'Completato!';
  setTimeout(()=>{ prog.textContent=''; }, 3000);
  await refreshCacheStats();
}

async function clearCacheAndRefresh() {
  if (!confirm('Cancellare la cache delle copertine?')) return;
  blobUrlCache.clear();
  coverCache.clear();
  await idbClear();
  await refreshCacheStats();
  // Re-render grid to remove loaded covers
  renderGrid();
}

function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

// ═══════════════════════════════════════════════════════════
//  LAZY LOADING  (IntersectionObserver)
// ═══════════════════════════════════════════════════════════
const lazyObserver = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (!e.isIntersecting) return;
    lazyObserver.unobserve(e.target);
    const card = e.target;
    const albumId = card.dataset.id;
    const img = card.querySelector('img');
    if (img && albumId) enqueueCover(albumId, img);
  });
}, {rootMargin: '300px'});

// ═══════════════════════════════════════════════════════════
//  HASH / GRADIENT
// ═══════════════════════════════════════════════════════════
function hashStr(s) {
  let h = 0;
  for (let i=0; i<s.length; i++) h = Math.imul(31,h)+s.charCodeAt(i)|0;
  return h >>> 0;
}
function getCoverStyle(album) {
  const h = hashStr(album.catalog);
  const hue  = h % 360;
  const hue2 = (hue + 35) % 360;
  const sat  = 8 + (h >> 8) % 14;
  const l1   = 6 + (h >> 16) % 8;
  const l2   = l1 + 7;
  return `background:linear-gradient(150deg,hsl(${hue},${sat}%,${l1}%),hsl(${hue2},${sat+3}%,${l2}%))`;
}

// ═══════════════════════════════════════════════════════════
//  FILTER / SORT / SEARCH
// ═══════════════════════════════════════════════════════════
function getVisibleAlbums() {
  let list = ALBUMS;

  // View filter
  if (currentView === 'owned')  list = list.filter(a => collection[a.id]?.owned);
  if (currentView === 'wish')   list = list.filter(a => wishlist[a.id]);
  if (currentView === 'series') list = list.filter(a => sheetMatch(a.sheet, currentSeries));
  if (currentView === 'artist') list = list.filter(a => {
    const names = new Set([...a.artistList, ...a.musicianList].map(normName));
    return names.has(currentArtist);
  });

  // Decade filter
  if (activeDecades.size > 0) {
    list = list.filter(a => {
      const yr = parseInt(a.year);
      return activeDecades.has(Math.floor(yr/10)*10);
    });
  }

  // Search
  if (searchQ) {
    const q = searchQ.toLowerCase();
    list = list.filter(a =>
      a.catalog.toLowerCase().includes(q) ||
      a.artist.toLowerCase().includes(q) ||
      a.title.toLowerCase().includes(q) ||
      (a.musicians||'').toLowerCase().includes(q)
    );
  }

  // Sort
  list = [...list].sort((a,b) => {
    if (sortBy === 'year')   return (parseInt(a.year)||0) - (parseInt(b.year)||0);
    if (sortBy === 'artist') return a.artist.localeCompare(b.artist);
    if (sortBy === 'title')  return a.title.localeCompare(b.title);
    // catalog: extract number
    const na = parseInt(a.catalog.match(/\d+/)?.[0]||0);
    const nb = parseInt(b.catalog.match(/\d+/)?.[0]||0);
    return na - nb;
  });

  return list;
}

function sheetMatch(sheet, series) {
  if (series === '1000') return sheet === '1000' || (sheet !== 'rarum' && sheet !== 'works' && parseInt(sheet) < 2000);
  if (series === '2000') return parseInt(sheet) >= 2000 && sheet !== 'rarum' && sheet !== 'works';
  return sheet === series;
}

function updateCounts() {
  const owned = ALBUMS.filter(a=>collection[a.id]?.owned).length;
  const wish  = Object.keys(wishlist).length;
  document.getElementById('cnt-all').textContent   = ALBUMS.length;
  document.getElementById('cnt-owned').textContent = owned;
  document.getElementById('cnt-wish').textContent  = wish;
  document.getElementById('cnt-1000').textContent  = ALBUMS.filter(a=>sheetMatch(a.sheet,'1000')).length;
  document.getElementById('cnt-2000').textContent  = ALBUMS.filter(a=>sheetMatch(a.sheet,'2000')).length;
  document.getElementById('cnt-rarum').textContent = ALBUMS.filter(a=>a.sheet==='rarum').length;
  document.getElementById('cnt-works').textContent = ALBUMS.filter(a=>a.sheet==='works').length;
}

//  RENDER GRID
// ═══════════════════════════════════════════════════════════
function renderGrid() {
  const list = getVisibleAlbums();
  const grid = document.getElementById('album-grid');
  const empty = document.getElementById('empty');
  const info  = document.getElementById('results-info');

  info.textContent = list.length + ' album';
  if (!list.length) { grid.innerHTML=''; empty.classList.add('show'); return; }
  empty.classList.remove('show');

  grid.innerHTML = list.map(a => {
    const isOwned = collection[a.id]?.owned;
    const isWish  = wishlist[a.id];
    const indHtml = isOwned
      ? '<div class="ind ind-owned" title="In collezione"></div>'
      : isWish
        ? '<div class="ind ind-wish" title="Wishlist"></div>'
        : '';
    const catNum = a.catalog.match(/\d+/)?.[0] || '';
    return `<div class="album-card" data-id="${esc(a.id)}" onclick="openDetail('${esc(a.id)}')">
      <div class="album-cover">
        <div class="album-cover-bg" style="${getCoverStyle(a)}">
          <span class="album-cover-num">${esc(a.catalog)}</span>
        </div>
        <img alt="" data-album-id="${esc(a.id)}" onload="this.classList.add('loaded');coverLoaded(this)">
      </div>
      <div class="album-info">
        <div class="album-artist">${esc(a.artist)}</div>
        <div class="album-title">${esc(a.title)}</div>
        <div class="album-meta">
          ${indHtml}
          <span class="album-year">${esc(a.year)}</span>
          <span class="album-cat">${esc(a.catalog)}</span>
        </div>
      </div>
    </div>`;
  }).join('');

  // Set up lazy loading
  grid.querySelectorAll('.album-card').forEach(card => {
    lazyObserver.observe(card);
  });

  // For already-cached items, apply blob URLs immediately
  grid.querySelectorAll('.album-card').forEach(async card => {
    const id = card.dataset.id;
    const img = card.querySelector('img');
    const cached = blobUrlCache.get(id);
    if (cached) { applySrc(img, cached); }
  });
}

function esc(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function buildDecadeButtons() {

    btn.textContent = `${d}s`;

  });
}

function toggleDecade() {
  const pills = document.getElementById('decade-pills');
  const btn = document.getElementById('fb-decade');
  if (pills.style.display === 'none') {
    pills.style.display='flex';
    btn.classList.add('active');
  } else {
    pills.style.display='none';
    btn.classList.remove('active');
    activeDecades.clear();
    document.querySelectorAll('#decade-pills .filter-btn').forEach(b=>b.classList.remove('active'));
    renderGrid();
  }
}

function toggleDecadeBtn(decade, btn) {
  if (activeDecades.has(decade)) {
    activeDecades.delete(decade);
    btn.classList.remove('active');
  } else {
    activeDecades.add(decade);
    btn.classList.add('active');
  }
  renderGrid();
}

// ═══════════════════════════════════════════════════════════
//  RELATED ALBUMS
// ═══════════════════════════════════════════════════════════
function getRelatedAlbums(album) {
  const names = new Set([...album.artistList, ...album.musicianList].map(normName).filter(Boolean));
  const related = new Map();
  names.forEach(name => {
    (artistIndex.get(name)||[]).forEach(id => {
      if (id === album.id) return;
      if (!related.has(id)) related.set(id, {count:0, shared:[]});
      const r = related.get(id);
      r.count++;
      r.shared.push(name);
    });
  });
  return [...related.entries()]
    .sort((a,b) => b[1].count - a[1].count)
    .map(([id,d]) => ({album: ALBUMS.find(a=>a.id===id), ...d}))
    .filter(x => x.album)
    .slice(0, 12);
}

async function openDetail(albumId) {
  const album = ALBUMS.find(a => a.id === albumId);
  if (!album) return;
  currentAlbum = album;

  const overlay = document.getElementById('detail-overlay');
  const isOwned = collection[albumId]?.owned;
  const isWish  = wishlist[albumId];

  // Cover
  const covBg  = document.getElementById('detail-cover-bg');
  const covImg = document.getElementById('detail-cover-img');
  const covNum = document.getElementById('detail-cover-num');
  covBg.style.cssText = 'position:absolute;inset:0;display:flex;align-items:center;justify-content:center;' + getCoverStyle(album);
  covNum.textContent = album.catalog;
  covImg.removeAttribute('src');

  // Meta
  document.getElementById('detail-cat').textContent    = album.catalog;
  document.getElementById('detail-title').textContent  = album.title;
  document.getElementById('detail-artist').textContent = album.artist;
  document.getElementById('detail-year').textContent   = album.year || '';
  document.getElementById('detail-musicians').textContent = album.musicians || '';
  const notesEl = document.getElementById('detail-notes');
  notesEl.textContent = album.notes ? `Note: ${album.notes}` : '';
  notesEl.style.display = album.notes ? 'block' : 'none';

  // Owned button
  const btnOwned = document.getElementById('btn-owned');
  btnOwned.textContent = isOwned ? '✓ In collezione' : '+ Aggiungi';
  btnOwned.className = 'btn ' + (isOwned ? 'btn-owned-active' : 'btn-primary');

  // Wish button
  const btnWish = document.getElementById('btn-wish');
  btnWish.textContent = isWish ? '★ Wishlist' : '♡ Wishlist';
  btnWish.className   = 'btn ' + (isWish ? 'btn-wish-active' : 'btn-wish');

  // Purchase date
  const purchDiv = document.getElementById('detail-purchase');
  purchDiv.style.display = isOwned ? 'block' : 'none';
  document.getElementById('purchase-date-input').value = collection[albumId]?.date || '';

  // Musicians section
  const musSection = document.getElementById('musicians-section');
  const musList    = document.getElementById('musician-list');
  const allNames = [...new Set([...album.artistList, ...album.musicianList].map(normName).filter(n=>n&&n.length>1))];
  if (allNames.length) {
    musList.innerHTML = allNames.map(n =>
      `<span class="musician-tag" onclick="showArtist('${esc(n)}')">${esc(n)}</span>`
    ).join('');
    musSection.style.display = 'block';
  } else {
    musSection.style.display = 'none';
  }

  // Related albums
  const related = getRelatedAlbums(album);
  const relSection = document.getElementById('related-section');
  const relList    = document.getElementById('related-list');
  const relCount   = document.getElementById('related-count');
  if (related.length) {
    relCount.textContent = `(${related.length})`;
    relList.innerHTML = related.map(r => {
      const a = r.album;
      const shared = r.shared.slice(0,2).join(', ');
      return `<div class="related-card" onclick="openDetail('${esc(a.id)}')">
        <div class="related-cover">
          <div style="position:absolute;inset:0;${getCoverStyle(a)}"></div>
          <img src="" data-album-id="${esc(a.id)}" onload="this.classList.add('loaded');coverLoaded(this)">
        </div>
        <div class="related-shared" title="${esc(r.shared.join(', '))}">via ${esc(shared)}</div>
        <div class="related-artist">${esc(a.artist)}</div>
        <div class="related-title">${esc(a.title)}</div>
      </div>`;
    }).join('');
    relSection.style.display = 'block';

    // Load related covers
    relList.querySelectorAll('img').forEach(img => {
      const aid = img.dataset.albumId;
      if (!aid) return;
      getBlobUrl(aid).then(url => { if(url) applySrc(img, url); else enqueueCover(aid, img); });
    });
  } else {
    relSection.style.display = 'none';
  }

  overlay.classList.add('open');

  // Load main cover
  const cachedUrl = await getBlobUrl(albumId);
  if (cachedUrl) {
    covImg.src = cachedUrl;
  } else {
    enqueueCover(albumId, covImg);
  }
}

  // Update button states

  if (wishlist[id]) {
    delete wishlist[id];
  } else {
    wishlist[id] = true;
  }

  updateCounts();

}

  if (!currentAlbum) return;
  const id = currentAlbum.id;

  saveCollection();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
async function init() {
  loadStorage();
  // Sync owned from data
  ALBUMS.forEach(a => {
    if (a.owned && !collection[a.id]) {
      collection[a.id] = {owned:true, date:''};
    }
  });
  saveCollection();

  // Pre-populate blobUrlCache from known mbids so covers survive re-renders
  Object.entries(mbidCache).forEach(([id, mbid]) => {
    if (mbid) blobUrlCache.set(id, `https://coverartarchive.org/release/${mbid}/front-250`);
  });

  buildArtistIndex();
  buildDecadeButtons();
  updateCounts();
  renderGrid();

  await openIDB();
